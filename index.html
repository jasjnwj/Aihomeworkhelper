<!DOCTYPE html>
<html>
<head>
  <title>StudyAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; text-align: center; padding: 40px; background:#0f172a; color:white;">

  <h1>📚 StudyAI</h1>
  <p style="color:#94a3b8;">Get clear explanations for your homework</p>

  <form id="form" style="margin-top:30px;">
    <input type="text" id="question" placeholder="Type your question..."
      style="padding:12px; width:70%; max-width:400px; border-radius:8px; border:none;">
    <br><br>
    <button type="submit"
      style="padding:12px 20px; border:none; border-radius:8px; background:#22c55e; font-weight:bold;">
      Get Help
    </button>
  </form>

  <p id="response" style="margin-top:20px; color:#cbd5f5;"></p>

  <script>
    document.getElementById("form").addEventListener("submit", function(e) {
      e.preventDefault();
      const q = document.getElementById("question").value;

      document.getElementById("response").innerText =
        "Got it. We're working on your answer 👀";
    });
  </script>

</body>
</html>
