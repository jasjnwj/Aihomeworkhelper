<!DOCTYPE html>
<html>
<head>
  <title>StudyAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      transition: 0.3s;
    }

    .dark {
      background: #0f172a;
      color: white;
    }

    .light {
      background: #f8fafc;
      color: black;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      font-weight: bold;
    }

    .btn {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #22c55e;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    input {
      padding: 12px;
      width: 70%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }

    .card {
      padding: 20px;
      border-radius: 10px;
      width: 220px;
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body class="dark">

<header>
  <div>📚 StudyAI</div>
  <button class="btn" onclick="toggleMode()">🌙 / ☀️</button>
</header>

<section class="hero">
  <h1>Solve math problems step-by-step</h1>
  <p>Type your math question and get clear, simple explanations instantly.</p>

  <form id="form">
    <input type="text" id="question" placeholder="e.g. 2x + 5 = 15" required>
    <br><br>
    <button type="submit" class="btn primary">Get Help</button>
  </form>

  <p style="font-size:14px; opacity:0.7;">Free to use • No signup required</p>

  <p id="response" style="margin-top:20px;"></p>

  <script>
document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const q = document.getElementById("question").value;

  document.getElementById("response").innerText =
    "Solving your problem... 🧠";

  try {
    const res = await fetch("http://localhost:3000/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        question: q
      })
    });

    const data = await res.json();

    document.getElementById("response").innerText =
      data.answer;

  } catch (error) {
    document.getElementById("response").innerText =
      "Error connecting to AI.";
  }
});
</script>

</section>

<section class="features">
  <div class="card">📸 Ask any math problem</div>
  <div class="card">🧠 Step-by-step explanations</div>
  <div class="card">⚡ Fast and simple answers</div>
</section>

<script>
function toggleMode() {
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
